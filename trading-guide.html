<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trading &amp; Technical Analysis — Complete Guide</title>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0D0F14; font-family: Georgia, serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0D0F14; }
    ::-webkit-scrollbar-thumb { background: #2DD4BF44; border-radius: 3px; }
    button { font-family: Georgia, serif; }
    input { font-family: Georgia, serif; }
    table { font-family: Georgia, serif; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

// ── Colors ────────────────────────────────────────────────────
const C = {
  bg:     "#0D0F14",
  card:   "#13161E",
  border: "#1E2230",
  gold:   "#C9A84C",
  goldL:  "#F0D080",
  teal:   "#2DD4BF",
  blue:   "#60A5FA",
  red:    "#F87171",
  green:  "#4ADE80",
  purple: "#A78BFA",
  orange: "#FB923C",
  text:   "#E2E8F0",
  muted:  "#64748B",
  dim:    "#94A3B8",
};

// ── Helpers ───────────────────────────────────────────────────
function Badge({ label, color = C.gold }) {
  return (
    <span style={{ fontSize: 10, fontWeight: 700, letterSpacing: 1.2,
      textTransform: "uppercase", color, border: `1px solid ${color}50`,
      padding: "2px 7px", borderRadius: 4, background: `${color}12` }}>
      {label}
    </span>
  );
}

function Card({ children, accent, style }) {
  return (
    <div style={{ background: C.card, border: `1px solid ${accent || C.border}30`,
      borderLeft: `3px solid ${accent || C.border}`,
      borderRadius: 10, padding: "14px 16px", marginBottom: 10,
      ...style }}>
      {children}
    </div>
  );
}

function Def({ term, color = C.gold, children }) {
  return (
    <div style={{ marginBottom: 14, borderBottom: `1px solid ${C.border}`, paddingBottom: 12 }}>
      <div style={{ fontSize: 14, fontWeight: 700, color, marginBottom: 5,
        fontFamily: "'Georgia', serif" }}>{term}</div>
      <div style={{ fontSize: 12.5, color: C.dim, lineHeight: 1.7 }}>{children}</div>
    </div>
  );
}

function Quote({ children, source }) {
  return (
    <div style={{ background: `${C.gold}08`, border: `1px solid ${C.gold}25`,
      borderLeft: `3px solid ${C.gold}`, borderRadius: 8,
      padding: "10px 14px", margin: "10px 0" }}>
      <div style={{ fontSize: 12.5, color: C.goldL, fontStyle: "italic", lineHeight: 1.7 }}>
        "{children}"
      </div>
      {source && <div style={{ fontSize: 11, color: C.muted, marginTop: 5 }}>— {source}</div>}
    </div>
  );
}

function Rule({ emoji, title, text, color = C.teal }) {
  return (
    <div style={{ display: "flex", gap: 10, marginBottom: 10,
      background: `${color}08`, border: `1px solid ${color}20`,
      borderRadius: 8, padding: "10px 12px" }}>
      <span style={{ fontSize: 18, flexShrink: 0 }}>{emoji}</span>
      <div>
        <div style={{ fontSize: 12, fontWeight: 700, color, marginBottom: 3 }}>{title}</div>
        <div style={{ fontSize: 12, color: C.dim, lineHeight: 1.6 }}>{text}</div>
      </div>
    </div>
  );
}

function Table({ headers, rows, colors }) {
  return (
    <div style={{ overflowX: "auto", marginBottom: 12 }}>
      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
        <thead>
          <tr>
            {headers.map((h, i) => (
              <th key={i} style={{ padding: "8px 10px", textAlign: "left",
                background: "#1a1d26", color: colors?.[i] || C.gold,
                fontWeight: 700, letterSpacing: 0.5, borderBottom: `1px solid ${C.border}` }}>
                {h}
              </th>
            ))}
          </tr>
        </thead>
        <tbody>
          {rows.map((row, i) => (
            <tr key={i} style={{ borderBottom: `1px solid ${C.border}20`,
              background: i % 2 === 0 ? "#13161E" : "#0f1118" }}>
              {row.map((cell, j) => (
                <td key={j} style={{ padding: "8px 10px", color: j === 0 ? C.text : C.dim,
                  fontWeight: j === 0 ? 600 : 400 }}>{cell}</td>
              ))}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function Tabs({ tabs, active, set, color = C.gold }) {
  return (
    <div style={{ display: "flex", overflowX: "auto", gap: 6, marginBottom: 16,
      paddingBottom: 4 }}>
      {tabs.map(t => (
        <button key={t.id} onClick={() => set(t.id)} style={{
          padding: "6px 14px", borderRadius: 20, fontSize: 11,
          whiteSpace: "nowrap", cursor: "pointer", fontWeight: 600,
          border: `1px solid ${active === t.id ? color : C.border}`,
          background: active === t.id ? `${color}20` : "transparent",
          color: active === t.id ? color : C.muted,
          letterSpacing: 0.3,
        }}>{t.label}</button>
      ))}
    </div>
  );
}

const CHAPTERS = [
  { id: "basics",     label: "📖 Basics",            color: C.gold },
  { id: "ta",         label: "📈 Technical",          color: C.teal },
  { id: "indicators", label: "🔢 Indicators",         color: C.blue },
  { id: "patterns",   label: "🕯️ Patterns",           color: C.orange },
  { id: "fa",         label: "🏢 Fundamental",        color: C.green },
  { id: "stockpick",  label: "🔍 Stock Selection",    color: C.goldL },
  { id: "tasetups",   label: "⚙️ TA Setups",           color: C.teal },
  { id: "phases",     label: "🌊 Market Phases",      color: C.blue },
  { id: "inv_types",  label: "💼 Investment Types",   color: C.green },
  { id: "exits",      label: "🚪 Exit Strategies",    color: C.orange },
  { id: "journey",    label: "🎓 Learning Journey",   color: C.purple },
  { id: "types",      label: "⚡ Trading Styles",     color: C.purple },
  { id: "wizard",     label: "🧙 Minervini",          color: C.goldL },
  { id: "ashwin",     label: "🇮🇳 Ashwin Method",     color: C.teal },
  { id: "risk",       label: "🛡️ Risk & Psychology",  color: C.red },
  { id: "glossary",   label: "📚 Glossary",           color: C.dim },
];

function Basics() {
  const [t, st] = useState("market");
  return (
    <div>
      <Tabs color={C.gold} active={t} set={st} tabs={[
        { id: "market",  label: "How Market Works" },
        { id: "orders",  label: "Order Types" },
        { id: "segments",label: "Segments" },
        { id: "players", label: "Market Players" },
      ]} />
      {t === "market" && <>
        <Quote source="Warren Buffett">In the short run the market is a voting machine. In the long run it is a weighing machine.</Quote>
        <Def term="What is the Stock Market?">A place where buyers and sellers trade shares of companies. Price is set by supply and demand — when more people want to buy, price goes up. When more want to sell, price falls. That's it. Everything else is just noise around this simple truth.</Def>
        <Def term="Bull Market 🐂">When prices are rising over a sustained period. Optimism is high. Economy usually growing. Most stocks go up. Easy to make money — even bad strategies work. Dangerous because it creates overconfidence.</Def>
        <Def term="Bear Market 🐻">When prices fall 20%+ from recent highs. Pessimism. Economy slowing or contracting. Most stocks fall. Separates good traders from lucky ones. Ashwin calls this when his VCP setups often fail.</Def>
        <Def term="Market Cycle">Four phases every market goes through: Accumulation (smart money buys quietly) → Markup (price rises, retail joins) → Distribution (smart money sells quietly) → Markdown (price falls). Repeats forever. Your job: identify which phase you're in.</Def>
        <Def term="Price Discovery">The continuous process of determining the fair value of an asset. News, earnings, sentiment, global events — all get absorbed into price instantly. By the time YOU read the news, price already reflects it. This is why Ashwin reads charts instead of news.</Def>
        <Table
          headers={["Term","Simple Meaning"]}
          colors={[C.gold, C.dim]}
          rows={[
            ["IPO","Company selling shares to public for first time. 'Going public.'"],
            ["Market Cap","Total value of company = Share price × Total shares"],
            ["Free Float","Shares available for public trading (excludes promoter holdings)"],
            ["Circuit Breaker","Exchange halts trading if price moves too much in one day (5/10/20%)"],
            ["T+1 Settlement","You buy today, shares arrive in demat account tomorrow"],
            ["Demat Account","Digital locker for your shares. Like a bank account but for stocks"],
          ]}
        />
      </>}
      {t === "orders" && <>
        <Def term="Market Order">Buy/sell IMMEDIATELY at whatever the current price is. Fast but you don't control the price. Use only for very liquid stocks. NEVER use for options — the bid-ask spread will hurt you.</Def>
        <Def term="Limit Order">Buy/sell only at YOUR specified price or better. You control the price but not the timing. May not execute if market doesn't reach your price. Always use this for options — Ashwin and all experts insist on this.</Def>
        <Def term="Stop Loss Order">Automatically sells when price hits a trigger level. Your safety net. Without this, one bad trade can wipe your account. Ashwin's Rule #1: always place stop loss the SAME SECOND you enter a trade.</Def>
        <Def term="GTT Order (Good Till Triggered)">A permanent standing order that stays active until triggered — even if you close the app. Sensibull supports this. Set your stop loss and target as GTT so you don't need to watch the screen all day.</Def>
        <Def term="Cover Order / Bracket Order">Entry + Stop Loss + Target — all in one. Automatically manages your trade. Reduces human error. Best for beginners who struggle with discipline.</Def>
        <Rule emoji="⚠️" color={C.red} title="The Golden Rule of Orders" text="ALWAYS use LIMIT orders for options. Market orders on illiquid options can cost you hundreds of rupees in slippage per lot." />
      </>}
      {t === "segments" && <>
        <Table
          headers={["Segment","What you trade","Settlement","Leverage"]}
          colors={[C.gold,C.teal,C.blue,C.orange]}
          rows={[
            ["Cash / Equity","Actual shares of companies","T+1 (next day)","None — you pay full price"],
            ["Futures (F&O)","Contract to buy/sell at future date","Daily MTM","5-10x (dangerous!)"],
            ["Options (F&O)","Right to buy/sell at a strike price","Expiry day","Built into premium"],
            ["Commodity","Gold, Silver, Crude Oil, etc on MCX","T+1 or T+2","5-15x on MCX"],
            ["Currency","USD/INR, EUR/INR etc","T+2","Up to 10x"],
          ]}
        />
        <Rule emoji="💡" color={C.teal} title="Where to start?" text="Cash equity first. Learn on real stocks with your own money (no leverage). Only move to F&O after proving yourself across multiple market cycles." />
      </>}
      {t === "players" && <>
        <Def term="FII — Foreign Institutional Investors">Goldman Sachs, JP Morgan, Blackrock, foreign hedge funds. They move HUGE amounts — tens of thousands of crores. When they buy India, market goes up. When they sell, market falls. They react to global macro: US rates, dollar strength, Iran war, etc.</Def>
        <Def term="DII — Domestic Institutional Investors">LIC, SBI Mutual Fund, HDFC MF, ICICI MF, PF/NPS funds. They collect Rs 52,000 Cr/month from SIPs and invest consistently. They 'buy the dip' when FIIs sell. The reason Indian market doesn't crash as hard as it used to.</Def>
        <Def term="Retail Traders">You and me. Small accounts, emotional decisions, tend to buy tops and sell bottoms. Make up 90%+ of option buyers. Collectively lose money. The smart way: act like an institution — follow rules, manage risk, think in probabilities.</Def>
        <Def term="HFT — High Frequency Traders">Algorithms that execute thousands of trades per second. They profit from tiny price differences. Impossible to compete with on speed. Don't try. Their presence makes markets more liquid but also increases short-term noise.</Def>
        <Def term="Promoters">Founders and large shareholders of a company. Their holding % matters — high promoter holding = confidence in own company. Promoters pledging shares = danger signal. SEBI requires disclosure of promoter transactions.</Def>
      </>}
    </div>
  );
}

function TechnicalAnalysis() {
  const [t, st] = useState("core");
  return (
    <div>
      <Tabs color={C.teal} active={t} set={st} tabs={[
        { id: "core",    label: "Core Concepts" },
        { id: "trend",   label: "Trend Analysis" },
        { id: "support", label: "Support & Resistance" },
        { id: "volume",  label: "Volume" },
        { id: "timeframes", label: "Timeframes" },
        { id: "log",     label: "Log vs Linear" },
      ]} />
      {t === "core" && <>
        <Quote source="Ashwin Raghavan">Charts are a representation of human psychology with money. The same patterns appear through the ages because human emotions don't change.</Quote>
        <Def term="Technical Analysis (TA)">Reading price and volume charts to predict future price movement. Based on three assumptions: (1) Market discounts everything — all known information is already in the price. (2) Prices move in trends. (3) History repeats — because human psychology is constant.</Def>
        <Def term="Price Action">The purest form of TA — just reading what price itself is doing, without any indicators. Where did it open? Where did it close? What was the high/low? How big was the candle? Volume? This is what Ashwin uses — price, volume, MAs. Nothing else.</Def>
        <Def term="Candlestick">A single bar on a chart showing: Open (where price started), High (highest point), Low (lowest point), Close (where it ended). Green/White = price went up. Red/Black = price went down. The size of the body and wicks tell a story.</Def>
        <Def term="Trend">The general direction prices are moving. Uptrend = series of higher highs + higher lows. Downtrend = series of lower highs + lower lows. Sideways = no clear direction. The most important skill in TA is correctly identifying the trend.</Def>
      </>}
      {t === "trend" && <>
        <Def term="Higher Highs & Higher Lows (HH/HL)">The definition of an uptrend. Each peak is higher than the last. Each dip is higher than the last. As long as this pattern holds, the trend is intact. When a higher low gets broken — trend may be ending.</Def>
        <Def term="Lower Highs & Lower Lows (LH/LL)">The definition of a downtrend. Each peak is lower. Each dip is lower. Only buy in confirmed uptrends. Ashwin never trades downtrending stocks — too much overhead supply.</Def>
        <Def term="Trend Line">A straight line drawn connecting the lows of an uptrend (support) or highs of a downtrend (resistance). More touches = stronger line. Break of trendline = potential trend change.</Def>
        <Def term="Moving Average Crossover">When faster MA crosses above slower MA = bullish signal (Golden Cross). When faster MA crosses below = bearish signal (Death Cross). Ashwin uses crossover of MAs as confirmation of trend direction.</Def>
        <Def term="Overhead Supply">Shares being sold by people who bought at higher prices and are waiting to 'get even.' This is why stocks struggle to recover after big falls — at every level, trapped buyers sell when they break even. Ashwin avoids stocks with heavy overhead supply — prefers near ATH where overhead supply is cleared.</Def>
      </>}
      {t === "support" && <>
        <Def term="Support Level">A price where buying is strong enough to stop a decline. Think of it as a floor. Why does support form? Because traders who missed buying earlier say 'I'll buy if it comes back to that level.' All that pending buy orders create a floor. Support is stronger if it has been tested multiple times.</Def>
        <Def term="Resistance Level">A price where selling is strong enough to stop a rally. Think of it as a ceiling. Traders who bought lower want to sell at a 'resistance' price. Once broken, old resistance often becomes new support (role reversal).</Def>
        <Def term="Support/Resistance Flip">When price breaks through resistance, it becomes the new support. And vice versa. This is one of the most reliable patterns in all of TA. After a breakout, the broken resistance level = ideal place to add to your position.</Def>
        <Def term="Round Numbers">Prices like Rs 100, Rs 500, Rs 1000, Nifty 20,000, 25,000 act as psychological support/resistance. Why? Because people naturally set targets and stop losses at round numbers. This creates clusters of orders at these levels.</Def>
        <Def term="OI-Based S&R (for options)">In Nifty options, strikes with highest Open Interest = strongest support/resistance. Sellers who wrote those contracts will defend those levels. Max Pain strike = strongest magnet near expiry. Unique to India's weekly options structure.</Def>
      </>}
      {t === "volume" && <>
        <Quote source="Ashwin Raghavan">A big green candle with small volume is a suspicious candle. I wouldn't trust that too much.</Quote>
        <Def term="Volume">Number of shares traded in a given period. The fuel behind price moves. High volume = conviction. Low volume = no conviction. Never ignore volume — it validates or invalidates every price move.</Def>
        <Def term="Volume Confirmation">A breakout on HIGH volume = real move. Institutions are buying. A breakout on LOW volume = fake-out. Likely to reverse. Ashwin requires 1.5-2x average volume on the breakout candle before entering.</Def>
        <Def term="Volume Dry-Up">During a consolidation/base, volume should SHRINK. This means sellers are exhausted — no more supply. When volume dries up near resistance, a big breakout is coming. This is a key VCP signal.</Def>
        <Def term="Climax Run / Volume Climax">A sudden massive volume spike after a long uptrend — often signals the TOP. Smart money distributing (selling quietly to excited retail buyers). Be careful of buying stocks showing climax volume after long runs.</Def>
        <Table
          headers={["Price","Volume","Signal","Meaning"]}
          colors={[C.green,C.orange,C.teal,C.dim]}
          rows={[
            ["UP","HIGH","🟢 Bullish","Real buying — institutions accumulating"],
            ["UP","LOW","⚠️ Weak","Fake rally — short covering, no real demand"],
            ["DOWN","HIGH","🔴 Bearish","Real selling — institutions distributing"],
            ["DOWN","LOW","✅ Healthy","Profit booking, big players haven't left"],
          ]}
        />
      </>}
      {t === "timeframes" && <>
        <Def term="Multiple Timeframe Analysis">The pro approach: confirm trend on higher timeframe, enter on lower timeframe. Weekly chart for trend direction. Daily chart for setup. 1H or 15-min for entry trigger. They should all tell the same story.</Def>
        <Table
          headers={["Timeframe","Who uses it","Hold period","Best for"]}
          colors={[C.gold,C.purple,C.blue,C.dim]}
          rows={[
            ["Monthly","Investors","Years","Identifying mega-trends"],
            ["Weekly","Swing traders","Weeks–months","Ashwin's watchlist scan"],
            ["Daily","All traders","Days–weeks","Primary chart for Ashwin's entries"],
            ["4 Hour","Active traders","Hours–days","Entry refinement"],
            ["1 Hour","Day traders","Hours","Intraday swing"],
            ["15 min","Scalpers","Minutes","Ashwin's entry trigger"],
            ["5 min / 1 min","HFT, scalpers","Seconds–minutes","Scalping (not recommended for beginners)"],
          ]}
        />
        <Rule emoji="💡" color={C.teal} title="When in doubt, zoom out" text="Ashwin's exact words. When your 5-min chart looks scary, check the daily. If daily trend is intact, the noise is irrelevant." />
      </>}
      {t === "log" && <>
        <Quote source="Ashwin Raghavan">A Rs 100 move at Rs 200 price = 50% move. Same Rs 100 move at Rs 1000 price = 10% move. Linear scale shows them identically. Log scale shows the truth.</Quote>
        <Def term="Linear Scale">Default chart scale. Equal distance for equal PRICE change. Rs 100 to Rs 200 looks same as Rs 1000 to Rs 1100 — both are Rs 100 moves. Problem: as a trader you care about % returns, not absolute price.</Def>
        <Def term="Logarithmic (Log) Scale">Equal distance for equal PERCENTAGE change. Rs 100 to Rs 200 (+100%) looks same size as Rs 1000 to Rs 2000 (+100%). This is how investors actually make money — in percentages. Use log scale for any chart older than 1 year.</Def>
        <Rule emoji="🔧" color={C.orange} title="How to switch on TradingView" text="Right click on the price axis → select 'Log Scale'. Ashwin does this as step 1 before reading any chart. Required for daily/weekly charts of long-running stocks." />
      </>}
    </div>
  );
}

function Indicators() {
  const [t, st] = useState("ma");
  const tabs = [
    { id: "ma", label: "Moving Averages" },
    { id: "rsi", label: "RSI" },
    { id: "macd", label: "MACD" },
    { id: "bb", label: "Bollinger Bands" },
    { id: "atr", label: "ATR" },
    { id: "other", label: "Others" },
  ];
  return (
    <div>
      <Tabs color={C.blue} active={t} set={st} tabs={tabs} />
      {t === "ma" && <>
        <Def term="Simple Moving Average (SMA)">Average closing price over N days. Equal weight to all days. Slower to react. Example: 200 SMA = sum of last 200 close prices ÷ 200. Less noise, but lags price more.</Def>
        <Def term="Exponential Moving Average (EMA)">Like SMA but gives MORE weight to recent prices. Reacts faster to recent moves. Ashwin uses EMA. Most traders prefer EMA for trading, SMA for longer-term analysis.</Def>
        <Def term="The MA Stack (Ashwin's Filter)">10 EMA > 20 EMA > 50 EMA > 200 EMA = all aligned = strong uptrend. Think of it as a conveyor belt — short term above medium above long term. When all aligned, trend is confirmed and safe to be long.</Def>
        <Table
          headers={["MA","What it tells you","Ashwin's rule"]}
          colors={[C.gold,C.dim,C.teal]}
          rows={[
            ["10 EMA","Very short-term momentum. 'Fast pulse'","Bounce off 10 EMA = ADD to position"],
            ["20 EMA","Short-term trend direction","Close BELOW 20 EMA = EXIT immediately"],
            ["50 EMA","Medium-term trend","Below 50 EMA = stock is struggling"],
            ["200 EMA","Long-term trend (the 'line in the sand')","NEVER enter if price below 200 EMA"],
          ]}
        />
        <Rule emoji="🚨" color={C.red} title="20 MA is Ashwin's hard stop" text="'If a stock closes below the 20 day moving average, I get out. Non-negotiable. This rule has saved me more times than I can count.'" />
      </>}
      {t === "rsi" && <>
        <Def term="RSI — Relative Strength Index">Measures how fast and how much price has moved recently. Scale 0-100. Above 70 = Overbought (may be due for pullback). Below 30 = Oversold (may be due for bounce). But: strong uptrends can stay 'overbought' for months. RSI is not a sell signal on its own.</Def>
        <Def term="RSI Divergence (Bullish)">Price makes new LOW but RSI makes HIGHER low. Means selling momentum is weakening even as price falls. Often precedes reversals. Reliable signal especially on daily and weekly charts.</Def>
        <Def term="RSI Divergence (Bearish)">Price makes new HIGH but RSI makes LOWER high. Means buying momentum is weakening. Smart money distributing. Warning signal near tops — not a reason to sell immediately, but a reason to reduce position size or tighten stops.</Def>
        <Table
          headers={["RSI Level","Meaning","Trading implication"]}
          colors={[C.purple,C.dim,C.teal]}
          rows={[
            ["Above 70","Overbought","Don't buy calls here. Consider selling if trending"],
            ["60-70","Strong trend","Trend intact — hold longs, look for bounces"],
            ["40-60","Neutral","Iron Condor territory — no strong directional bias"],
            ["30-40","Weak trend","Caution for long positions"],
            ["Below 30","Oversold","Potential bounce. Don't sell puts aggressively here"],
          ]}
        />
      </>}
      {t === "macd" && <>
        <Def term="MACD — Moving Average Convergence Divergence">Shows relationship between two EMAs (usually 12 and 26 day). MACD Line = 12 EMA minus 26 EMA. Signal Line = 9 EMA of MACD. Histogram = difference between the two. When MACD crosses above Signal Line = bullish. Below = bearish.</Def>
        <Def term="MACD Histogram">The bars above/below zero. Growing bars = momentum increasing. Shrinking bars = momentum weakening. Ashwin doesn't use MACD — but it's widely used by swing traders to time entries and exits in trending stocks.</Def>
        <Def term="MACD Divergence">Same concept as RSI divergence. Price making new highs but MACD making lower highs = bearish divergence. Very reliable on weekly charts for identifying major tops.</Def>
      </>}
      {t === "bb" && <>
        <Def term="Bollinger Bands">Three lines: Middle band = 20 SMA. Upper band = 20 SMA + 2 standard deviations. Lower band = 20 SMA - 2 standard deviations. About 95% of all price action stays WITHIN the bands. When price hits upper band = stretched. When it hits lower band = compressed.</Def>
        <Def term="Bollinger Band Squeeze">When the bands get very narrow (come close together), it means volatility is very low. Like a coiled spring. A squeeze almost always precedes a BIG move — in either direction. Very useful for straddle buyers (buy when squeeze, exit after the explosion).</Def>
        <Def term="Bollinger Band Walk">In a strong trend, price can 'walk' along the upper band for extended periods — touching it candle after candle. This is NOT overbought — it's a sign of STRENGTH. Don't sell short when price is walking the upper band.</Def>
      </>}
      {t === "atr" && <>
        <Def term="ATR — Average True Range">Measures how much a stock typically moves per day (in rupees/points). If ATR = Rs 50, that stock moves Rs 50/day on average. Used for: stop loss placement (set stop 2x ATR below entry), position sizing (smaller position for high ATR stocks), and volatility context.</Def>
        <Def term="ATR Stop Loss">Instead of an arbitrary 5% stop, use 2×ATR. Example: Stock at Rs 1000, ATR = Rs 30. ATR stop = Rs 1000 - (2 × Rs 30) = Rs 940. This accounts for normal daily volatility — you won't get stopped out by regular noise.</Def>
        <Rule emoji="💡" color={C.blue} title="ATR practical use" text="Volatile stocks (high ATR) need wider stops. Less volatile stocks (low ATR) need tighter stops. Using a fixed 5% stop on all stocks is wrong — you'll get stopped out of volatile stocks on normal moves." />
      </>}
      {t === "other" && <>
        <Def term="VWAP — Volume Weighted Average Price">Average price weighted by volume throughout the day. Institutions often use VWAP as benchmark. Price above VWAP = bullish intraday. Price below = bearish. Very useful for intraday traders. Less relevant for swing/positional traders.</Def>
        <Def term="Stochastic Oscillator">Like RSI but uses High/Low/Close differently. Range 0-100. Above 80 = overbought. Below 20 = oversold. Works better in ranging markets than RSI. Many traders combine Stochastic with RSI for confirmation.</Def>
        <Def term="Supertrend">A popular Indian retail trader indicator. Green = buy signal. Red = sell signal. Simple but effective for trending markets. Fails in choppy sideways markets. Shows support/resistance trail. Many Indian traders use it as their primary signal.</Def>
        <Def term="OBV — On Balance Volume">Running total of volume — adds volume on up days, subtracts on down days. If OBV rising while price is flat = accumulation (bullish). If OBV falling while price is flat = distribution (bearish). Smart money footprint detector.</Def>
      </>}
    </div>
  );
}

function Patterns() {
  const [t, st] = useState("cont");
  return (
    <div>
      <Tabs color={C.orange} active={t} set={st} tabs={[
        { id: "cont",    label: "Continuation" },
        { id: "reversal",label: "Reversal" },
        { id: "candles", label: "Candlesticks" },
        { id: "vcp",     label: "VCP (Minervini)" },
      ]} />
      {t === "cont" && <>
        <Card accent={C.orange}>
          <div style={{ fontSize: 12, color: C.dim, marginBottom: 8 }}>Continuation patterns form DURING a trend and signal the trend will continue after a brief pause. These are the BEST patterns to trade — you're going with the trend.</div>
        </Card>
        <Def term="Flag Pattern">After a sharp move up (flagpole), price consolidates in a tight downward channel (flag). When price breaks out of the flag = trend continues. The tighter the flag, the more powerful the breakout. One of the most reliable continuation patterns.</Def>
        <Def term="Bull Flag">Upward flagpole + small downward consolidation channel. Entry: break above the upper boundary of the flag. Volume should dry up during the flag and spike on the breakout. Very common in strong uptrending stocks.</Def>
        <Def term="Pennant">Similar to flag but the consolidation is a triangle (converging lines) instead of a parallel channel. Tight price action. Volume dries up. Breakout on volume = entry. Slightly rarer than flag but equally reliable.</Def>
        <Def term="Cup and Handle">Stock rises, rounds off into a 'U' shape (cup), then forms a small downward drift (handle), then breaks out. The handle is similar to a bull flag. Made famous by William O'Neil. A favourite of Minervini. Often precedes 20-40% moves.</Def>
        <Def term="Flat Base">A tight horizontal consolidation after a prior uptrend. Price barely moves for several weeks. Volume extremely low. When it finally breaks out on volume — powerful move. Ashwin's VCP is a variation of this concept.</Def>
      </>}
      {t === "reversal" && <>
        <Card accent={C.red}>
          <div style={{ fontSize: 12, color: C.dim, marginBottom: 8 }}>Reversal patterns form at TOPS or BOTTOMS and signal the trend is changing. These are harder to trade — you're trying to catch a turning point. Higher failure rate than continuation patterns.</div>
        </Card>
        <Def term="Head and Shoulders (H&S)">Three peaks — a higher middle peak (head) flanked by two lower peaks (shoulders). The line connecting the two troughs = neckline. Break below neckline = sell signal. Measured move: target = head height projected downward from neckline. One of the most reliable reversal patterns.</Def>
        <Def term="Double Top">Price tests the same resistance level twice, fails both times, then breaks support. Looks like 'M'. Signals buyers couldn't push price higher twice. Break of neckline = sell signal. Volume should be higher on first peak than second (weakening buying).</Def>
        <Def term="Double Bottom">Opposite of double top. Looks like 'W'. Price tests same support twice, bounces both times. Break above neckline = buy signal. Volume should be higher on the second bounce (strengthening buying).</Def>
        <Def term="Rounding Bottom (Saucer)">A slow, gradual reversal from downtrend to uptrend. Takes months to form. Like the cup part of a cup-and-handle without the handle. Institutional accumulation happening slowly. Once breakout occurs — big move follows.</Def>
      </>}
      {t === "candles" && <>
        <Table
          headers={["Candle Name","What it looks like","What it means"]}
          colors={[C.orange,C.dim,C.teal]}
          rows={[
            ["Doji","Open ≈ Close, equal wicks","Indecision. Neither bulls nor bears won."],
            ["Hammer","Small body, long lower wick","Buyers rejected lower prices. Bullish reversal signal at bottoms."],
            ["Shooting Star","Small body, long upper wick","Sellers rejected higher prices. Bearish at tops."],
            ["Engulfing Bullish","Large green candle swallows prior red","Bulls took over from bears. Strong reversal signal."],
            ["Engulfing Bearish","Large red candle swallows prior green","Bears took over from bulls. Strong reversal signal."],
            ["Marubozu","No wicks, full body","One side dominated completely. Trend continuation likely."],
            ["Inside Bar","Bar completely within prior bar","Pause. Compression. Breakout coming soon."],
            ["Pin Bar","Long wick, small body","Rejection of a price level. Reversal possible."],
          ]}
        />
        <Rule emoji="💡" color={C.orange} title="Candles need context" text="A hammer at support after a long decline = very bullish. The same hammer in the middle of a range = meaningless. NEVER read candles in isolation. Always ask: where is this forming? What's the trend? What's the volume?" />
      </>}
      {t === "vcp" && <>
        <Quote source="Mark Minervini, Trade Like a Stock Market Wizard">The VCP is the fingerprint of institutional accumulation. It tells you exactly when to buy — not a moment too early, not a moment too late.</Quote>
        <Def term="VCP — Volatility Contraction Pattern">Developed by Mark Minervini. A stock in a prior uptrend makes a series of price contractions — each correction smaller than the last (in % terms). Volume dries up. Then breaks out on high volume. Ashwin uses this as his PRIMARY setup for stocks and commodities.</Def>
        <Def term="The 4 Requirements for a Valid VCP">1) Prior uptrend of at least 30% before the base. 2) At least 3 price contractions (each smaller than the last). 3) Volume declining during each contraction. 4) Pivot point (resistance) clearly defined. ALL 4 must be present.</Def>
        <Def term="Pivot Point">The exact price level where the VCP breaks out. The high of the last small contraction. This is your entry price — buy the BREAKOUT above the pivot on high volume. Not before. Entry before breakout = premature — often gets stopped out.</Def>
        <Def term="Tight Areas">Within the VCP, look for a 'tight area' — 2-3 weeks where price barely moves (1-2% range). This shows extreme supply exhaustion. The tighter the area, the more explosive the breakout. Minervini calls this the 'pivot buy point.'</Def>
        <Card accent={C.goldL}>
          <div style={{ fontWeight: 700, color: C.goldL, marginBottom: 8 }}>VCP Visual Representation</div>
          <div style={{ fontFamily: "monospace", fontSize: 11, color: C.dim, lineHeight: 2 }}>
            {"    /\\ "}<br />
            {"   /  \\   /\\ "}<br />
            {"  /    \\ /  \\  /\\"}<br />
            {" /      v    \\/ v    /BREAKOUT!"}<br />
            {"/              \\  /↗"}<br />
            {"                \\/    ← Pivot"}<br />
            {"     ← Wider →  ← Tighter →"}
          </div>
          <div style={{ fontSize: 11, color: C.muted, marginTop: 8 }}>Each correction is smaller than the last. Volume dries up. Then explosive breakout on 2-3x volume.</div>
        </Card>
      </>}
    </div>
  );
}

function Fundamental() {
  const [t, st] = useState("ratios");
  return (
    <div>
      <Tabs color={C.green} active={t} set={st} tabs={[
        { id: "ratios",  label: "Key Ratios" },
        { id: "quality", label: "Quality Checks" },
        { id: "earnings",label: "Earnings" },
        { id: "fvsta",   label: "FA vs TA" },
      ]} />
      {t === "ratios" && <>
        <Table
          headers={["Ratio","Formula","What it means","Good/Bad"]}
          colors={[C.green,C.dim,C.dim,C.teal]}
          rows={[
            ["P/E Ratio","Price ÷ EPS","How much you pay per rupee of earnings","Lower = cheaper. But high P/E can be justified for growth companies."],
            ["P/B Ratio","Price ÷ Book Value","Market value vs accounting value","Below 1 = potentially undervalued. High P/B = market expects growth."],
            ["ROE","Net Profit ÷ Equity","How well management uses shareholders' money","Above 15% = good. Above 25% = excellent (Minervini's requirement)."],
            ["Debt/Equity","Total Debt ÷ Equity","How much debt the company carries","Lower is better. High debt = risky in rising interest rate environment."],
            ["EPS Growth","(New EPS - Old EPS) ÷ Old EPS","Earnings per share growth rate","Minervini requires 25%+ growth. Ashwin doesn't focus on this."],
            ["Revenue Growth","Sales growth YoY","Top-line business momentum","Accelerating growth = best signal. Decelerating = warning."],
            ["Operating Margin","Operating Profit ÷ Revenue","Core business profitability","Higher and stable = better quality business."],
            ["Free Cash Flow","Operating Cash - Capex","Actual cash generated (profit can be manipulated)","Positive and growing = healthy business."],
          ]}
        />
      </>}
      {t === "quality" && <>
        <Def term="Management Quality">The most important fundamental factor. Is management honest? Do they do what they say? Are promoters increasing or pledging stake? History of capital allocation? Ashwin spent 6 years at PhonePe and learned: great companies have great leaders who under-promise and over-deliver.</Def>
        <Def term="Promoter Holding & Pledging">Promoters holding large stake = skin in the game, confidence. Promoters PLEDGING shares = danger signal — they're using shares as collateral for loans. If share price falls, lenders sell the pledged shares → cascade. Always check promoter pledge % on BSE/NSE website.</Def>
        <Def term="Moat (Competitive Advantage)">Warren Buffett's concept. Something that protects a business from competition. Types: brand (HUL, Asian Paints), network effect (NSE, Info Edge), cost advantage (Coal India), switching costs (TCS clients), regulatory protection (HDFC Bank license). Companies with wide moats compound wealth over decades.</Def>
        <Def term="Working Capital Management">How efficiently a company manages inventory, receivables, and payables. Negative working capital cycle = company gets paid before it needs to pay suppliers (like Dmart, Zomato) = very strong business model. Positive cycle = company needs capital to run = funding risk.</Def>
      </>}
      {t === "earnings" && <>
        <Def term="EPS — Earnings Per Share">Net profit divided by number of shares. This is the 'E' in P/E ratio. Growing EPS = growing profit per share = stock goes up over time. Minervini requires EPS growth of 25%+ in recent quarters to consider a stock.</Def>
        <Def term="Earnings Surprise">When actual earnings beat analyst estimates. Positive surprise = stock jumps. Negative surprise = stock crashes. The MAGNITUDE of the surprise matters more than the direction. A company that consistently beats estimates = institutional interest.</Def>
        <Def term="Earnings Acceleration">EPS growth rate itself is accelerating. Was 10% growth, now 20%, now 30%. This is Minervini's MOST important signal — it means the business is going through an inflection point. Like a car not just speeding up but accelerating harder.</Def>
        <Def term="IV Crush (for options traders)">Around earnings, IV (implied volatility) spikes dramatically. Options become very expensive. After earnings, IV collapses 30-70% overnight regardless of direction. This destroys option buyers. Smart traders SELL premium before earnings. Never buy options just before earnings — you will almost always lose even if the direction is right.</Def>
      </>}
      {t === "fvsta" && <>
        <Quote source="Ashwin Raghavan">By the time you read about why a stock is going up, smart money already positioned 3-6 months ago. The chart told me before the news was public.</Quote>
        <Table
          headers={["Factor","Technical Analysis","Fundamental Analysis"]}
          colors={[C.gold,C.teal,C.green]}
          rows={[
            ["Focus","Price, volume, patterns","Revenue, profit, quality"],
            ["Time horizon","Days to months","Months to years"],
            ["Entry signal","Chart breakout","Valuation below intrinsic value"],
            ["Who uses it","Traders (Ashwin, Minervini)","Investors (Buffett, Lynch)"],
            ["Works best in","Trending markets","All market conditions"],
            ["Weakness","Can't assess business quality","Can't time the market"],
            ["India context","Works great (trending stocks, F&O)","Less used in day trading"],
          ]}
        />
        <Rule emoji="💡" color={C.green} title="The combined approach" text="Minervini uses BOTH. He screens fundamentally (EPS growth, ROE, float) then enters technically (VCP breakout). The fundamental screen ensures you're in quality companies. The technical entry ensures you buy at the right time." />
      </>}
    </div>
  );
}

function RiskPsych() {
  const [t, st] = useState("sizing");
  return (
    <div>
      <Tabs color={C.red} active={t} set={st} tabs={[
        { id: "sizing",  label: "Position Sizing" },
        { id: "stops",   label: "Stop Losses" },
        { id: "rr",      label: "Risk:Reward" },
        { id: "psych",   label: "Psychology" },
        { id: "mistakes",label: "Top Mistakes" },
      ]} />
      {t === "sizing" && <>
        <Def term="The 1% Rule">Never risk more than 1-2% of your total trading capital on any single trade. Rs 10 lakh portfolio = max Rs 10,000-20,000 at risk per trade. This means even 10 consecutive losses only cost 10-20% of capital — survivable and recoverable.</Def>
        <Def term="Position Sizing Formula">Position Size = (Portfolio × Risk %) ÷ Stop Loss %. Example: Rs 10L portfolio, risk 1%, stop loss 8%. Max position = (10L × 1%) ÷ 8% = Rs 1,25,000</Def>
        <Def term="Pyramiding (Adding to Winners)">Ashwin's method: enter with 50% of planned size at breakout. If it works (goes up), add 30% on first 10 DMA bounce. Add remaining 20% on second confirmation. Never add to LOSERS. Only add to WINNERS. This maximises returns on your best ideas.</Def>
        <Rule emoji="⚠️" color={C.red} title="Ashwin's capital lesson" text="'Ask yourself: if this entire amount is wiped out tomorrow, can you still live your life? Trade only with that amount. The pain of losing it should be real but not life-destroying.'" />
      </>}
      {t === "stops" && <>
        <Def term="Why Stop Loss is Non-Negotiable">Without stop loss: a stock falls 50% and you need 100% gain just to break even. A stock falls 80% needs 400% to recover. Most retail traders who blow accounts do so because they 'didn't set a stop loss this one time.' That one time is always the catastrophic loss.</Def>
        <Def term="Where to Place Stop Loss">Ashwin: below 20 DMA on daily chart. Minervini: 6-8% below entry. Better method: below the last significant low within the VCP base. Logic: if price comes back to that level, your thesis is invalidated — get out.</Def>
        <Def term="Mental Stop vs Hard Stop">Mental stop = 'I'll sell if it hits Rs 480.' Hard stop = GTT order sitting in your broker. Always use HARD stops. Mental stops fail because of hope, greed, and rationalization. 'It'll come back' is the most expensive phrase in trading.</Def>
        <Def term="Stop Loss Placement Error">Setting stop too tight (within normal daily volatility) = gets triggered on normal noise. Setting too wide = huge loss when triggered. Use ATR to calibrate: stop should be 1.5-2x ATR below entry to avoid normal volatility but catch real trend breaks.</Def>
      </>}
      {t === "rr" && <>
        <Def term="Risk:Reward Ratio (R:R)">For every Rs 1 you risk losing, how much can you potentially gain? 1:2 R:R = risk Rs 100 to potentially make Rs 200. Minimum acceptable: 1:2. Minervini targets 1:3 to 1:5. Never take trades with R:R below 1:1.5.</Def>
        <Def term="Expectancy">The average amount you make per trade taking both win rate and R:R into account. Formula: (Win% × Avg Win) - (Loss% × Avg Loss). Positive expectancy = profitable system. You can have 40% win rate and still be highly profitable with good R:R.</Def>
        <Table
          headers={["Win Rate","R:R Ratio","Expectancy per Rs 100","Profitable?"]}
          colors={[C.gold,C.teal,C.green,C.dim]}
          rows={[
            ["70%","1:1","70-30 = +Rs 40","Yes"],
            ["50%","1:2","100-50 = +Rs 50","Yes"],
            ["40%","1:3","120-60 = +Rs 60","Yes ← Minervini style"],
            ["35%","1:5","175-65 = +Rs 110","Yes ← Best outcome"],
            ["60%","1:0.5","30-40 = -Rs 10","NO! ← Options buyers at expiry"],
            ["70%","1:0.8","56-24 = +Rs 32","Barely — not worth the effort"],
          ]}
        />
      </>}
      {t === "psych" && <>
        <Quote source="Mark Minervini">Emotional discipline is THE edge. Markets are mostly efficient. Your edge is doing what others can't — holding winners, cutting losers, sitting in cash when there's nothing to do.</Quote>
        <Def term="Loss Aversion">Humans feel losses ~2.5x more intensely than gains. This causes: holding losers too long (won't accept the loss), selling winners too early (afraid to give back profits). Understanding this bias is the first step to overcoming it.</Def>
        <Def term="Recency Bias">After 5 winning trades, you feel you can't lose. After 5 losing trades, you feel you can't win. Both lead to bad decisions. Process matters, not recent results. Ashwin: 'My biggest losses came after my biggest wins.'</Def>
        <Def term="Revenge Trading">Trying to immediately recover a loss with the next trade. Leads to bigger position sizes, worse entry quality, emotional decisions. After a loss: take a break. Review what went wrong. Only return when calm.</Def>
        <Def term="FOMO — Fear of Missing Out">Chasing a stock that's already moved 20% because you 'missed' the setup. Results in bad R:R, buying at tops, forced entries. Ashwin on Micron: 'This trade is over. Wait for the next setup.'</Def>
        <Def term="Confirmation Bias">Seeking information that supports your existing position and ignoring contradictory signals. Example: stock below 20 MA but you tell yourself 'the long-term story is intact.' The solution: define rules in advance and follow them mechanically.</Def>
      </>}
      {t === "mistakes" && <>
        {[
          { m: "No Stop Loss", c: C.red, fix: "ALWAYS place stop loss the same second you enter. GTT order. No exceptions." },
          { m: "Averaging Down on Losers", c: C.red, fix: "Never add to a losing position hoping for recovery. Cut losses short. Only add to winners." },
          { m: "Trading Expiry Day", c: C.orange, fix: "Options decay to zero rapidly on expiry. Exit 2-3 days before. Never hold to expiry." },
          { m: "Using Market Orders for Options", c: C.orange, fix: "Always limit orders for options. Bid-ask spread will destroy you with market orders." },
          { m: "All-In Single Trade", c: C.red, fix: "Never put more than 10-15% of capital in one trade. Position sizing is survival." },
          { m: "Trading Against the Trend", c: C.orange, fix: "Never buy below 200 MA. Never sell short above 200 MA in a bull market." },
          { m: "Revenge Trading", c: C.orange, fix: "After a loss, take 24 hours off. Come back with a clear head. Rules only." },
          { m: "Borrowed/Needed Money", c: C.red, fix: "Only trade money you can afford to lose completely. Never borrow to trade." },
          { m: "Tips & Telegram Channels", c: C.orange, fix: "You learn nothing from tips. Build your own system. As Ashwin says: 'Tips se kya seekhoge?'" },
          { m: "Neglecting the Market Trend", c: C.red, fix: "80% of stocks follow the market direction. If Nifty is falling, 80% of longs will fail." },
        ].map((item, i) => (
          <div key={i} style={{ borderBottom: `1px solid ${C.border}`, padding: "9px 0", display: "flex", gap: 10 }}>
            <div style={{ flexShrink: 0, width: 8, height: 8, borderRadius: "50%", background: item.c, marginTop: 5 }} />
            <div>
              <div style={{ fontSize: 12, fontWeight: 700, color: item.c, marginBottom: 2 }}>{item.m}</div>
              <div style={{ fontSize: 12, color: C.dim, lineHeight: 1.5 }}>Fix: {item.fix}</div>
            </div>
          </div>
        ))}
      </>}
    </div>
  );
}

function Glossary() {
  const [search, setSearch] = useState("");
  const terms = [
    ["52-Week High/Low","The highest and lowest price in the last year. Stocks near 52-week high = strong momentum."],
    ["ADR","American Depositary Receipt. Indian company shares trading on US exchanges (e.g. Infosys on NYSE)."],
    ["Alpha","Returns above the benchmark (Nifty). Positive alpha = outperforming the market."],
    ["Beta","Sensitivity to market moves. Beta 1.5 = stock moves 15% when Nifty moves 10%. Higher beta = more volatile."],
    ["Block Deal","Large institutional trade (minimum Rs 10 crore) done outside normal market. Signals major position change."],
    ["Circuit","Price limit for a day. Upper circuit = max rise. Lower circuit = max fall. 5%, 10%, or 20% limits."],
    ["Consolidation","Sideways price movement after a trend. Market 'digesting' the prior move. VCP forms during consolidation."],
    ["Correction","A pullback of 10-20% from recent highs. Normal and healthy within an uptrend."],
    ["Crash","A sudden severe market decline (20%+). Rare but happens every 5-10 years."],
    ["CMP","Current Market Price. The price right now."],
    ["Dead Cat Bounce","A temporary small recovery in a downtrend before price resumes falling. Not a reversal."],
    ["Delivery %","% of traded volume that resulted in actual delivery (not squared off). High delivery = conviction."],
    ["Derivatives","Financial instruments whose value is derived from an underlying asset. Futures and Options are derivatives."],
    ["Divergence","When price and an indicator move in opposite directions. Signals potential trend change."],
    ["EMA","Exponential Moving Average. Weighted towards recent prices."],
    ["Expiry","The date on which an options or futures contract expires. NSE: monthly + weekly (Tuesday)."],
    ["Float","Number of shares available for public trading. Small float = bigger price moves on same volume."],
    ["Futures","Contract to buy/sell at a future date at today's price. Leveraged. Daily mark-to-market."],
    ["Gap Up / Gap Down","When price opens significantly above/below previous close. Earnings, news-driven."],
    ["Hedge","Taking an opposing position to protect against losses in another position."],
    ["IV","Implied Volatility. Market's expectation of future volatility. High IV = expensive options."],
    ["Leverage","Using borrowed capital to amplify returns (and losses). Futures give 5-10x leverage."],
    ["Liquidity","How easily you can buy or sell without moving the price. Nifty = very liquid. Small stocks = illiquid."],
    ["Long","Buying a stock/option/future with expectation of price rising."],
    ["Lot Size","Minimum quantity for F&O trading. Nifty = 75 shares per lot."],
    ["Mark-to-Market (MTM)","Daily settlement of gains/losses in futures. Profit/loss credited/debited daily, not at exit."],
    ["MACD","Moving Average Convergence Divergence. Momentum indicator."],
    ["Market Order","Execute immediately at best available price. Avoid for options."],
    ["Max Pain","Option strike where maximum options expire worthless. Market gravitates here near expiry."],
    ["Momentum","The rate of acceleration of price movement. 'A stock in motion tends to stay in motion.'"],
    ["MWPL","Market Wide Position Limit. If exceeded, stock enters F&O ban period."],
    ["NIFTY 50","Index of top 50 companies on NSE by market cap. Benchmark for Indian equity market."],
    ["OI","Open Interest. Total outstanding contracts in an option/future."],
    ["PCR","Put-Call Ratio. Measure of market sentiment. High PCR = bearish sentiment (contrarian bullish)."],
    ["PE Ratio","Price-to-Earnings. How much market pays for each rupee of earnings."],
    ["Premium","The price you pay for an option. Time value + Intrinsic value."],
    ["Resistance","Price level where selling pressure is strong enough to halt a rally."],
    ["RSI","Relative Strength Index. Momentum oscillator 0-100. Above 70 = overbought."],
    ["Scalping","Very short-term trading style. Many small trades. Seconds to minutes."],
    ["Short","Selling a stock/future you don't own, expecting price to fall."],
    ["Short Squeeze","When heavily shorted stocks rise sharply, forcing shorts to cover at higher prices, causing further rise."],
    ["SIP","Systematic Investment Plan. Regular fixed investment in mutual funds. DII's steady ammunition."],
    ["SMA","Simple Moving Average. Equal weight to all periods."],
    ["Spread","Difference between bid and ask price. OR: options strategy using two legs."],
    ["Support","Price level where buying is strong enough to halt a decline."],
    ["Theta","Options greek. Rate of daily time decay. Benefits option sellers."],
    ["Upper/Lower Circuit","NSE's daily price limits. Prevents manipulation. Stock halted at limits."],
    ["VIX","Volatility Index. India VIX measures expected Nifty volatility. Higher = more fear."],
    ["VWAP","Volume Weighted Average Price. Institutional benchmark for intraday trades."],
    ["Whipsaw","Quick false breakout that immediately reverses. Gets traders out at wrong time."],
  ].filter(([term]) => search === "" || term.toLowerCase().includes(search.toLowerCase()));

  return (
    <div>
      <input
        value={search}
        onChange={e => setSearch(e.target.value)}
        placeholder="Search terms..."
        style={{ width: "100%", padding: "10px 14px", borderRadius: 8, border: `1px solid ${C.border}`,
          background: C.card, color: C.text, fontSize: 13, marginBottom: 14,
          outline: "none", boxSizing: "border-box" }}
      />
      {terms.map(([term, def], i) => (
        <div key={i} style={{ display: "flex", gap: 12, padding: "9px 0",
          borderBottom: `1px solid ${C.border}20` }}>
          <div style={{ minWidth: 150, fontSize: 12, fontWeight: 700,
            color: C.gold, flexShrink: 0 }}>{term}</div>
          <div style={{ fontSize: 12, color: C.dim, lineHeight: 1.6 }}>{def}</div>
        </div>
      ))}
      {terms.length === 0 && <div style={{ fontSize: 13, color: C.muted, textAlign: "center", padding: 20 }}>No terms found for "{search}"</div>}
    </div>
  );
}

      {t === "bull" && <>
        <Def term="Bull Market Definition">A sustained rise of 20%+ from recent lows. Typically lasts 2-5 years. Average bull market gain: 180%+. India's major bull runs: 2003-2007, 2009-2010, 2012-2018, 2020-2024. Bull markets die of euphoria or rate hikes — not old age.</Def>

        <Def term="What works in a Bear Market">Short selling (advanced). Bear Put Spreads. Defensive stocks (FMCG, Pharma, IT services). Gold (safe haven). Cash. Put buying early in bear. Iron Condors fail — avoid. Wait for Phase 1 signals before going long.</Def>
        <Rule emoji="🛡️" color={C.red} title="Bear market survival rules" text="1) Reduce position sizes. 2) Raise cash. 3) Stop buying dips until trend confirms. 4) Don't average down. 5) Accept small losses early rather than catastrophic losses later." />
      </>}
      {t === "sideways" && <>

function ExitStrategies() {
  const [t, st] = useState("why");
  return (
    <div>
      <Tabs color={C.orange} active={t} set={st} tabs={[
        { id: "why",     label: "Why Exits Matter" },
        { id: "stop",    label: "Stop Loss Exits" },
        { id: "target",  label: "Profit Target Exits" },
        { id: "trail",   label: "Trailing Exits" },
        { id: "time",    label: "Time-Based Exits" },
        { id: "invest_exit", label: "Investment Exits" },
      ]} />
      {t === "why" && <>
        <Quote source="Ashwin Raghavan">Entry is easy. Exit is the hardest part. It's a constant work in progress. Even after years of trading.</Quote>
        <Quote source="Mark Minervini">The exit is where you make or lose money. The entry just determines your risk. The exit determines your reward.</Quote>
        <Def term="Why Exit Strategy is the Most Important Skill">Entry gets you in. Exit determines whether you make money. Two traders can enter the same stock at the same price — the one with a better exit strategy makes 10x more. Most beginners obsess over entry signals and ignore exit completely. This is backwards.</Def>
        <Def term="The Three Exit Scenarios">Every trade ends in one of three ways: (1) Stop loss hit — market went against you, exit at predefined loss. (2) Target hit — market went your way, exit at predefined profit. (3) Time stop — neither target nor stop hit after X days, exit and redeploy capital.</Def>
        <Table headers={["Exit Type","When to use","Pro","Con"]}
          colors={[C.orange,C.dim,C.green,C.red]}
          rows={[
            ["Hard stop loss","Always — from entry","Protects capital","May get triggered on noise"],
            ["Trailing stop","After position profitable","Lets winners run","Gives back some profit"],
            ["Fixed target","When you need income certainty","Definite profit","Misses bigger moves"],
            ["Scale out","Partial exits along the way","Balanced approach","Complexity"],
            ["Time stop","When trade not working in time","Frees capital","May exit just before move"],
            ["MA break","Technical signal","Objective rule","Lag (reacts to past data)"],
          ]}
        />
      </>}
      {t === "stop" && <>
        <Def term="Hard Stop Loss">A predetermined price where you exit NO MATTER WHAT. Set it BEFORE entering. Place it as a GTT order so emotion can't interfere. This is non-negotiable — it's the only thing standing between you and a catastrophic loss.</Def>
        <Def term="Percentage-Based Stop">Set stop X% below entry. Simple but can be wrong for the stock's volatility. Example: 8% stop for all stocks. Minervini's rule: never let a loss exceed 8%. Disadvantage: doesn't account for normal daily volatility (ATR).</Def>
        <Def term="ATR-Based Stop">Stop = Entry - (2 × ATR). Accounts for normal daily volatility. If stock moves Rs 50/day normally, stop at 2×Rs 50 = Rs 100 below entry. Avoids being stopped out on noise. Best for commodity futures.</Def>
        <Def term="Technical Stop (Below Support)">Stop just below the nearest support level, key moving average, or pattern low. Logic: if price breaks that level, your trade thesis is wrong. Ashwin: stop below 20 DMA. Minervini: stop below the pivot buy point.</Def>
        <Rule emoji="⚠️" color={C.red} title="Stop loss psychology" text="When your stop is hit, you MUST exit. The most common mistake: 'I'll just give it a little more room.' This is how small losses become catastrophic ones. Treat your stop like a contract with yourself." />
      </>}
      {t === "target" && <>
        <Def term="Fixed Profit Target">Set a target price BEFORE entering. Sell when target is hit. Simple, disciplined. Works for income-focused traders. Disadvantage: you exit too early in strong trending stocks — the biggest gains require riding the trend.</Def>
        <Def term="R-Multiple Targets">Target based on your risk (R). If stop loss = Rs 50 risk (1R), target 2R = Rs 100 profit, 3R = Rs 150. Ensures your wins are always bigger than losses. Minervini targets minimum 2-3R on every trade.</Def>
        <Def term="Scale-Out Targets (Ashwin's Method)">Don't exit all at once. First exit: sell 50% at first target (+15-20%). Second exit: sell 25% at second target (+30-40%). Trail remaining 25% until stop is hit. This way: you always book some profit, but keep exposure to the biggest potential move.</Def>
        <Def term="Fibonacci Targets">Use Fibonacci extension levels (1.272, 1.618, 2.618) above the base as price targets. Based on natural mathematical ratios that appear repeatedly in market prices. Many institutions use these levels, which makes them self-fulfilling.</Def>
      </>}
      {t === "trail" && <>
        <Def term="Trailing Stop Loss">A stop that automatically moves UP as the stock price rises. Locks in profits while letting winners run. If stock goes from Rs 100 to Rs 150 with 10% trail, stop moves from Rs 90 to Rs 135. You never give back more than 10% of the high.</Def>
        <Def term="Moving Average Trail">Trail stop to the 20 DMA (Ashwin), 50 DMA, or 200 DMA depending on your time horizon. Day/week traders: trail to 10 or 20 DMA. Swing traders: 20 or 50 DMA. Long-term investors: 200 DMA. Exit when price closes below the trailing MA.</Def>
        <Def term="Parabolic Move Exit">When a stock goes parabolic (near-vertical rise, 3-5 standard deviations from MA), the risk of reversal is extreme. Even committed holders should sell 50-75% into parabolic moves — the reversal, when it comes, is violent and fast.</Def>
        <Table headers={["Time horizon","Trail method","Exit signal"]}
          colors={[C.gold,C.teal,C.orange]}
          rows={[
            ["Day trader","VWAP or 5 EMA","Close below VWAP or 5 EMA"],
            ["Swing (days-weeks)","20 EMA daily","Daily close below 20 EMA"],
            ["Positional (weeks-months)","50 EMA daily","Daily close below 50 EMA"],
            ["Long-term (months-years)","200 EMA or 10 wk MA","Weekly close below 200 EMA"],
            ["Ashwin (stocks/futures)","20 EMA daily","Hard close below 20 EMA = FULL EXIT"],
          ]}
        />
      </>}
      {t === "time" && <>
        <Def term="Time Stop">If a trade doesn't move in your expected direction within X days — exit regardless of profit or loss. Reason: capital tied in a non-moving position has opportunity cost. 10 days of sideways = better to redeploy capital elsewhere.</Def>
        <Def term="Options Time Stop (Critical)">Options lose value every day (theta decay). For buyers: exit if your option is not in profit within 5-7 days. Even if direction is right, you may not have enough time left for the move to overcome theta decay. Ashwin abandoned options buying for this reason.</Def>
        <Def term="Expiry-Based Exits (Options Sellers)">For Iron Condor / spreads: exit when 50% of max profit is reached OR when 5-7 days to expiry arrive — whichever comes first. Never hold options positions into expiry day. Gamma acceleration can destroy profits in hours.</Def>
        <Rule emoji="⏰" color={C.orange} title="The options time rule" text="Never hold to expiry. Exit options positions 2-3 days before expiry. The gamma risk in the final 48 hours makes even winning positions highly unpredictable." />
      </>}
      {t === "invest_exit" && <>
        <Def term="When to Exit a Long-Term Investment">General principles: (1) Exit when the reason you bought is no longer valid. (2) Exit when you need the money. (3) Exit when valuation is extreme (P/E 3x historical). (4) Exit if better opportunity found. NOT: 'it has doubled, so I should sell.'</Def>
        <Def term="Story Change Exit">You bought Zomato because food delivery would grow massively. If the story changes (regulations, competition, unit economics deteriorate) — exit even at a loss. The original thesis no longer holds. Price doesn't matter; thesis matters.</Def>
        <Def term="Valuation Exit">If P/E is 3x historical average with no fundamental change — trim position. Not full exit, but reduce. Example: Nifty PE above 25 = reduce equity allocation. Below 15 = increase. Mean reversion in valuations is powerful over long horizons.</Def>
        <Def term="Rebalancing Exit">Periodic selling of overperforming assets to maintain target allocation. Annual exercise. Sell what has grown most (take profits), buy what has fallen (buy dip). Enforces 'buy low, sell high' mechanically.</Def>
        <Table headers={["Investment type","Exit trigger","Key consideration"]}
          colors={[C.gold,C.dim,C.teal]}
          rows={[
            ["Direct stocks","Story change, valuation extreme, better opportunity","Tax: hold 1yr for LTCG benefit"],
            ["Mutual Funds","Goal achieved, fund underperforms benchmark 3yr","Exit load (1% if < 1yr)"],
            ["FD","On maturity / reinvest","Premature: 0.5-1% penalty"],
            ["Gold","Portfolio rebalancing, inflation normalised","SGB: hold 8yr for tax-free exit"],
            ["Real Estate","Need liquidity, rental yield falls below FD rate","High transaction costs (2-5%)"],
            ["PPF/EPF","Only at maturity / retirement","Premature: only allowed in specific cases"],
          ]}
        />
      </>}
    </div>
  );
}

              <div style={{ background: `${C.gold}08`, border: `1px solid ${C.gold}20`, borderLeft: `3px solid ${C.gold}`, borderRadius: 8, padding: "10px 12px" }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: C.gold, marginBottom: 5 }}>TARGET / EXIT</div>
                <div style={{ fontSize: 12, color: C.dim, lineHeight: 1.5 }}>{activeSetup.target}</div>
              </div>
            </div>
          </div>
          <div style={{ background: `${currStyle.color}08`, border: `1px solid ${currStyle.color}20`, borderRadius: 10, padding: "12px 14px" }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: currStyle.color, marginBottom: 8, textTransform: "uppercase", letterSpacing: 1 }}>Key Rules</div>
            {activeSetup.rules.map((r, i) => (
              <div key={i} style={{ display: "flex", gap: 8, fontSize: 12, color: C.dim, padding: "4px 0", lineHeight: 1.5 }}>
                <span style={{ color: currStyle.color, flexShrink: 0 }}>›</span>{r}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

      <div style={{ background: "#0f1118", borderBottom: `1px solid ${C.border}`,

        fontSize: 10, color: C.muted, borderTop: `1px solid ${C.border}` }}>

  );
}


    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
